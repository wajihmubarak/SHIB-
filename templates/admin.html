<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم | Wajih PRO</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

:root {
    --gold: #f3ba2f;
    --bg: #070A12;
    --card: rgba(255,255,255,0.05);
    --stroke: rgba(255,255,255,0.08);
    --text: #fff;
    --red: #ff4d4d;
    --green: #00ff88;
}

* { margin: 0; padding: 0; font-family: 'Cairo', sans-serif; box-sizing: border-box; }

body {
    background: radial-gradient(circle at top, #1a1a2e, var(--bg));
    color: var(--text); padding: 20px; min-height: 100vh;
}

header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 30px; border-bottom: 1px solid var(--stroke); padding-bottom: 15px;
}

.logo { font-weight: 900; color: var(--gold); font-size: 20px; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }

.stat-card {
    background: var(--card); border: 1px solid var(--stroke);
    border-radius: 18px; padding: 15px; text-align: center;
}
.stat-card b { font-size: 22px; color: var(--gold); display: block; margin-top: 5px; }

.admin-card {
    background: var(--card); border: 1px solid var(--stroke);
    border-radius: 20px; padding: 20px; margin-bottom: 20px;
}

h3 { font-size: 16px; margin-bottom: 15px; border-right: 3px solid var(--gold); padding-right: 10px; }

input, textarea {
    width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--stroke);
    background: rgba(0,0,0,0.3); color: #fff; margin-bottom: 10px; outline: none;
}

button {
    width: 100%; padding: 12px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--gold), #ffdd66);
    font-weight: 900; cursor: pointer; color: #000; transition: 0.3s;
}

.withdraw-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px 0; border-bottom: 1px solid var(--stroke); transition: 0.4s ease;
}

code { color: #888; background: rgba(255,255,255,0.03); padding: 3px 7px; border-radius: 6px; font-size: 12px; }

/* TOAST */
#toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--gold); color: #000; padding: 12px 25px;
    border-radius: 30px; font-weight: bold; display: none; z-index: 3000;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}

/* MODAL CONFIRMATION */
#confirm-modal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 2000;
    justify-content: center; align-items: center;
}

.modal-content {
    background: var(--bg); width: 90%; max-width: 350px; text-align: center;
    border: 1px solid var(--gold); border-radius: 25px; padding: 25px;
    animation: popUp 0.3s ease-out;
}

@keyframes popUp { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>

<div id="toast"></div>

<div id="confirm-modal">
    <div class="modal-content">
        <div style="background:rgba(243,186,47,0.1); width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 15px;">
            <i class="fas fa-paper-plane" style="color:var(--gold); font-size:24px;"></i>
        </div>
        <h3>تأكيد الدفع</h3>
        <p style="color:#888; font-size:13px; margin-bottom:20px;">هل قمت بتحويل المبلغ للمستخدم فعلياً عبر شبكة BEP20؟</p>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button id="confirm-yes" style="background:var(--green);">نعم، تم</button>
            <button onclick="closeConfirmModal()" style="background:rgba(255,255,255,0.1); color:#fff;">إلغاء</button>
        </div>
    </div>
</div>

<header>
    <div class="logo"><i class="fas fa-user-shield"></i> لوحة الإدارة</div>
    <div style="font-size: 11px; color: var(--gold); font-weight: bold;">WAJIH SYSTEM PRO</div>
</header>

<div class="stats-grid">
    <div class="stat-card"><span>المستخدمين</span><b>1,420</b></div>
    <div class="stat-card"><span>طلبات معلقة</span><b style="color: var(--red);">2</b></div>
</div>

<div class="admin-card">
    <h3><i class="fas fa-wallet"></i> طلبات السحب المعلقة</h3>
    
    <div class="withdraw-item">
        <div style="flex: 1;">
            <b>Borno (USDT BEP20)</b>
            <div style="margin: 5px 0;">
                <code>0x12b9c7d4e1...9b</code> 
                <i class="fas fa-copy" onclick="copyAddress('0x15f33DCeF103d2e76CCd4B53Dc33789a8e6b72dE')" style="color: var(--gold); cursor: pointer; margin-right: 5px;"></i>
            </div>
            <div style="color: var(--gold); font-weight: 900;">$50.00</div>
        </div>
        <div style="display: flex; gap: 8px;">
            <button onclick="approveRequest(this)" style="background: var(--green); width: 45px;"><i class="fas fa-check"></i></button>
            <button onclick="rejectRequest(this)" style="background: var(--red); width: 45px;"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <div class="withdraw-item">
        <div style="flex: 1;">
            <b>User_CR7 (USDT BEP20)</b>
            <div style="margin: 5px 0;">
                <code>0x12b9c7d4e1...9b</code>
                <i class="fas fa-copy" onclick="copyAddress('0x12b9c7d4e1...9b')" style="color: var(--gold); cursor: pointer; margin-right: 5px;"></i>
            </div>
            <div style="color: var(--gold); font-weight: 900;">$120.00</div>
        </div>
        <div style="display: flex; gap: 8px;">
            <button onclick="approveRequest(this)" style="background: var(--green); width: 45px;"><i class="fas fa-check"></i></button>
            <button onclick="rejectRequest(this)" style="background: var(--red); width: 45px;"><i class="fas fa-times"></i></button>
        </div>
    </div>
</div>

<div class="admin-card">
    <h3><i class="fas fa-bullhorn"></i> إشعار للنظام</h3>
    <textarea id="admin-msg" placeholder="اكتب رسالة تظهر للمستخدمين..."></textarea>
    <button onclick="showToast('تم بث الرسالة بنجاح 📣')">بث الإشعار</button>
</div>

<script>
let itemToProcess = null;

function copyAddress(text) {
    navigator.clipboard.writeText(text);
    showToast("تم نسخ العنوان للمحافظة 📋");
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.innerHTML = msg;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2500);
}

function approveRequest(btn) {
    itemToProcess = btn.closest('.withdraw-item');
    document.getElementById('confirm-modal').style.display = 'flex';
    
    document.getElementById('confirm-yes').onclick = function() {
        itemToProcess.style.transform = "translateX(100px)";
        itemToProcess.style.opacity = "0";
        setTimeout(() => { itemToProcess.remove(); }, 400);
        closeConfirmModal();
        showToast("تم تأكيد عملية السحب ✅");
    };
}

function rejectRequest(btn) {
    if(confirm("هل أنت متأكد من رفض الطلب؟")) {
        const item = btn.closest('.withdraw-item');
        item.style.transform = "scale(0.8)";
        item.style.opacity = "0";
        setTimeout(() => { item.remove(); }, 400);
        showToast("تم رفض الطلب ❌");
    }
}

function closeConfirmModal() {
    document.getElementById('confirm-modal').style.display = 'none';
}
async function loadAdminData() {
    // كود لجلب قائمة السحوبات أو إحصائيات المستخدمين من السيرفر
    const res = await fetch('/api/admin/stats'); 
    const data = await res.json();
    // عرض البيانات في الجدول
}

</script>

</body>
</html>
